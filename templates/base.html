<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Irrigation Hub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <div class="brand">Causwagan Norte Farm</div>
        <nav class="topnav" aria-label="Main navigation">
            <a href="{{ url_for('home_page') }}" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
            <a href="{{ url_for('testing_page') }}" class="{% if active_page == 'testing' %}active{% endif %}">Testing</a>
            <a href="{{ url_for('analytics_page') }}" class="{% if active_page == 'analytics' %}active{% endif %}">Analytics</a>
            <a href="{{ url_for('hardware_page') }}" class="{% if active_page == 'hardware' %}active{% endif %}">Hardware</a>
        </nav>
    </header>

    <main class="page-wrap">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/common.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
